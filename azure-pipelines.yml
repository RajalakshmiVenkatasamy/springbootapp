trigger:
- main
variables:
  imageName: springbootapp
  tag: $(Build.BuildId)

pool:
  vmImage: 'ubuntu-latest'

steps:

# 1️⃣ Build Spring Boot JAR
- task: Maven@3
  inputs:
    mavenPomFile: 'pom.xml'
    goals: 'clean package'
    publishJUnitResults: false

# 2️⃣ Build Docker Image & Push to ACR
- task: Docker@2
  inputs:
    containerRegistry: 'ACR-ServiceConnection'   # Your Docker/ACR service connection1
    repository: $(imageName)
    command: 'buildAndPush'
    Dockerfile: '**/Dockerfile'
    tags: |
      $(tag)
# ------------------------------
# 1️⃣ Install Trivy (stable method)
- task: Bash@3
  displayName: Install Trivy
  inputs:
    targetType: inline
    script: |
      sudo apt-get update
      sudo apt-get install -y wget apt-transport-https gnupg lsb-release
      wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo apt-key add -
      echo deb https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main | sudo tee /etc/apt/sources.list.d/trivy.list
      sudo apt-get update
      sudo apt-get install -y trivy
      trivy --version

# ------------------------------
- task: Bash@3
  displayName: Run Trivy Scan
  inputs:
    targetType: inline
    script: |
      echo "Scanning Docker image..."
      trivy image --severity HIGH,CRITICAL,MEDIUM --ignore-unfixed $IMAGE_REPOSITORY:$TAG
  env:
    IMAGE_REPOSITORY: $(imageRepository)
    TAG: $(tag)
  
 # 3️⃣ Deploy to AKS
- task: KubernetesManifest@1
  inputs:
    action: deploy
    kubernetesServiceConnection: 'AKS-CONNECTION-NEW-2026'  # Your AKS service connection
    manifests: |
      aks-deploy-from-acr.yaml
    containers: |
      myaksacr98765.azurecr.io/springbootapp:$(Build.BuildId)
    arguments: '--validate=false'
    
