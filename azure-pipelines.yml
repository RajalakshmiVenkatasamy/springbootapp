trigger:
- main
variables:
  imageName: springbootapp
  tag: $(Build.BuildId)

pool:
  vmImage: 'ubuntu-latest'

steps:

# 1️⃣ Build Spring Boot JAR
- task: Maven@3
  inputs:
    mavenPomFile: 'pom.xml'
    goals: 'clean package'
    publishJUnitResults: false

# 2️⃣ Build Docker Image & Push to ACR
- task: Docker@2
  inputs:
    containerRegistry: 'ACR-ServiceConnection'   # Your Docker/ACR service connection1
    repository: $(imageName)
    command: 'buildAndPush'
    Dockerfile: '**/Dockerfile'
    tags: |
      $(tag)

# 🔐 Docker Scan Step
- script: |
    sudo apt-get update
    sudo apt-get install wget -y
    wget https://github.com/aquasecurity/trivy/releases/latest/download/trivy_0.50.0_Linux-64bit.deb
    sudo dpkg -i trivy_0.50.0_Linux-64bit.deb
    trivy image --severity HIGH,CRITICAL --exit-code 1 myaksacr98765.azurecr.io/springbootapp:$(Build.BuildId)
  displayName: 'Scan Docker Image with Trivy'
  
 # 3️⃣ Deploy to AKS
- task: KubernetesManifest@1
  inputs:
    action: deploy
    kubernetesServiceConnection: 'AKS-CONNECTION-NEW-2026'  # Your AKS service connection
    manifests: |
      aks-deploy-from-acr.yaml
    containers: |
      myaksacr98765.azurecr.io/springbootapp:$(Build.BuildId)
    arguments: '--validate=false'
    
